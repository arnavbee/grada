<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grada — Smart Catalog</title>
<style>
  :root { --grada-accent: #A06F42; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--grada-accent); display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
  svg { display: block; width: 100%; max-width: 680px; margin: 0 auto; }

  @keyframes draw    { from { stroke-dashoffset: var(--len); opacity:0; } to { stroke-dashoffset: 0; opacity:1; } }
  @keyframes fadeup  { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadein  { from { opacity:0; } to { opacity:1; } }

  .d { animation: draw    var(--dur,1.8s) var(--del,0s) cubic-bezier(.4,0,.2,1) both; }
  .f { animation: fadein  var(--dur,.5s)  var(--del,0s) ease both; }
  .u { animation: fadeup  var(--dur,.55s) var(--del,0s) ease both; }
</style>
</head>
<body>
<svg viewBox="0 0 680 580" xmlns="http://www.w3.org/2000/svg" width="100%">
<defs>
  <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- BG -->
<rect x="0" y="0" width="680" height="580" fill="var(--grada-accent)" class="f" style="--del:0s;--dur:.6s"/>

<!-- HANGER -->
<path d="M240 132 Q240 120 252 120 Q264 120 264 132" fill="none" stroke="#FFF8EE" stroke-width="1.1" class="d" style="--len:60;stroke-dasharray:60;--del:1.1s;--dur:.6s" opacity=".85"/>
<line x1="190" y1="148" x2="310" y2="148" stroke="#FFF8EE" stroke-width="1.3" class="d" style="--len:130;stroke-dasharray:130;--del:1.5s;--dur:.6s" opacity=".85"/>
<rect x="243" y="148" width="14" height="10" rx="1.5" fill="none" stroke="#FFF8EE" stroke-width="0.9" class="d" style="--len:50;stroke-dasharray:50;--del:2.0s;--dur:.4s" opacity=".8"/>

<!-- KURTA BODY -->

<!-- Sleeve seams -->
<path d="M152 242 Q160 248 170 248" fill="none" stroke="#FFF8EE" stroke-width="0.8" opacity=".5"

  class="d" style="--len:120;stroke-dasharray:120;--del:5.3s;--dur:.6s"/>
<ellipse cx="282" cy="318" rx="16" ry="21" fill="none" stroke="#FFF8EE" stroke-width="0.7" opacity=".5"

  fill="none" stroke="#FFF8EE" stroke-width="0.7" opacity=".45"
  class="d" style="--len:300;stroke-dasharray:300;--del:6.0s;--dur:.8s"/>

<!-- CALLOUTS -->
<!-- 1. CATEGORY -->
<line x1="280" y1="176" x2="390" y2="180" stroke="#FFF8EE" stroke-width="0.7" stroke-dasharray="3 3" opacity=".7"
  class="d" style="--len:120;stroke-dasharray:120;--del:7.0s;--dur:.5s"/>
<circle cx="280" cy="176" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:7.4s;--dur:.3s"/>
<text x="396" y="174" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:7.5s;--dur:.4s">CATEGORY</text>
<text x="396" y="188" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:7.6s;--dur:.4s">Ethnic Wear / Kurta</text>

<!-- 2. STYLE NAME -->
<line x1="286" y1="222" x2="390" y2="228" stroke="#FFF8EE" stroke-width="0.7" stroke-dasharray="3 3" opacity=".7"
  class="d" style="--len:120;stroke-dasharray:120;--del:7.6s;--dur:.5s"/>
<circle cx="286" cy="222" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:8.0s;--dur:.3s"/>
<text x="396" y="222" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:8.1s;--dur:.4s">STYLE NAME</text>
<text x="396" y="236" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:8.2s;--dur:.4s">AI-generated from image</text>

<circle cx="348" cy="318" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:8.4s;--dur:.3s"/>
<text x="396" y="312" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:8.5s;--dur:.4s">MEASUREMENTS</text>
<text x="396" y="326" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:8.6s;--dur:.4s">Chest, length, sleeve</text>

<!-- 4. STYLE CODE -->
<line x1="348" y1="390" x2="390" y2="390" stroke="#FFF8EE" stroke-width="0.7" stroke-dasharray="3 3" opacity=".7"
  class="d" style="--len:80;stroke-dasharray:80;--del:8.6s;--dur:.4s"/>
<circle cx="348" cy="390" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:8.9s;--dur:.3s"/>
<text x="396" y="384" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:9.0s;--dur:.4s">STYLE CODE</text>
<text x="396" y="398" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:9.1s;--dur:.4s">KRT-DSR-FL-001</text>

<!-- 5. COLOR / PRINT -->
<line x1="152" y1="285" x2="100" y2="272" stroke="#FFF8EE" stroke-width="0.7" stroke-dasharray="3 3" opacity=".7"
  class="d" style="--len:80;stroke-dasharray:80;--del:9.1s;--dur:.4s"/>
<circle cx="152" cy="285" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:9.4s;--dur:.3s"/>
<text x="44" y="266" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:9.5s;--dur:.4s">COLOR / PRINT</text>
<text x="44" y="280" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:9.6s;--dur:.4s">Dusty rose, floral</text>

<!-- 6. FABRIC -->
<line x1="165" y1="348" x2="100" y2="340" stroke="#FFF8EE" stroke-width="0.7" stroke-dasharray="3 3" opacity=".7"
  class="d" style="--len:80;stroke-dasharray:80;--del:9.6s;--dur:.4s"/>
<circle cx="165" cy="348" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:9.9s;--dur:.3s"/>
<text x="44" y="334" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:10.0s;--dur:.4s">FABRIC</text>
<text x="44" y="348" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:10.1s;--dur:.4s">Cotton, woven</text>

<!-- 7. COMPOSITION -->
<line x1="170" y1="378" x2="100" y2="386" stroke="#FFF8EE" stroke-width="0.7" stroke-dasharray="3 3" opacity=".7"
  class="d" style="--len:80;stroke-dasharray:80;--del:10.1s;--dur:.4s"/>
<circle cx="170" cy="378" r="2.5" fill="#FFF8EE" opacity=".8" class="f" style="--del:10.4s;--dur:.3s"/>
<text x="44" y="372" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#FFF8EE" letter-spacing="1.5" class="u" style="--del:10.5s;--dur:.4s">COMPOSITION</text>
<text x="44" y="386" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,238,.75)" class="u" style="--del:10.6s;--dur:.4s">100% Cotton</text>

<!-- FOOTER -->
<line x1="44" y1="468" x2="636" y2="468" stroke="rgba(255,248,238,0.2)" stroke-width="0.8" class="d" style="--len:600;stroke-dasharray:600;--del:11.0s;--dur:.7s"/>
<text x="44" y="492" font-family="Georgia,serif" font-size="9" fill="rgba(255,248,238,.4)" letter-spacing="1" class="f" style="--del:11.5s;--dur:.5s">GRADA — FASHION OPERATIONS PLATFORM</text>
<text x="636" y="492" font-family="Georgia,serif" font-size="9" fill="rgba(255,248,238,.4)" letter-spacing="1" text-anchor="end" class="f" style="--del:11.5s;--dur:.5s">GRADA-WEB.VERCEL.APP</text>

</svg>
</body>
</html>
