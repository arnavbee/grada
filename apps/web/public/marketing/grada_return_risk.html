
<style>
@keyframes draw{from{stroke-dashoffset:var(--l)}to{stroke-dashoffset:0}}
@keyframes pop{0%{opacity:0;transform:scale(0)}100%{opacity:1;transform:scale(1)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes barRise{from{height:0;y:var(--by)}to{height:var(--bh);y:var(--ty)}}
@keyframes pulse{0%,100%{opacity:1;r:5}50%{opacity:0.5;r:7}}
@keyframes scanH{from{transform:translateY(-60px)}to{transform:translateY(200px)}}
svg{display:block;width:100%;height:auto}
</style>

<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg">
<rect width="900" height="540" fill="#1a100a"/>

<!-- grid backdrop -->
<defs>
  <pattern id="g" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0L0 0 0 48" fill="none" stroke="rgba(255,248,230,0.04)" stroke-width="0.6"/>
  </pattern>
  <clipPath id="chartClip"><rect x="120" y="100" width="460" height="280"/></clipPath>
</defs>
<rect width="900" height="540" fill="url(#g)"/>

<!-- ── CHART AREA ── -->
<!-- axes -->
<line x1="120" y1="100" x2="120" y2="380"
  stroke="rgba(255,248,230,0.2)" stroke-width="0.8"
  stroke-dasharray="280" stroke-dashoffset="280"
  style="animation:draw 0.6s ease 0.3s forwards;--l:280"/>
<line x1="120" y1="380" x2="580" y2="380"
  stroke="rgba(255,248,230,0.2)" stroke-width="0.8"
  stroke-dasharray="460" stroke-dashoffset="460"
  style="animation:draw 0.8s ease 0.7s forwards;--l:460"/>

<!-- Y-axis label -->
<text x="36" y="240" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,230,0.3)"
  text-anchor="middle" font-style="italic" opacity="0"
  style="animation:fadeUp 0.4s ease 1.2s forwards">Return rate</text>
<text x="350" y="415" font-family="Georgia,serif" font-size="10" fill="rgba(255,248,230,0.3)"
  text-anchor="middle" font-style="italic" opacity="0"
  style="animation:fadeUp 0.4s ease 1.3s forwards">SKU index</text>

<!-- horizontal grid lines -->
<line x1="120" y1="300" x2="580" y2="300" stroke="rgba(255,248,230,0.06)" stroke-width="0.6"
  stroke-dasharray="460" stroke-dashoffset="460"
  style="animation:draw 0.5s ease 1s forwards;--l:460"/>
<line x1="120" y1="220" x2="580" y2="220" stroke="rgba(255,248,230,0.06)" stroke-width="0.6"
  stroke-dasharray="460" stroke-dashoffset="460"
  style="animation:draw 0.5s ease 1.1s forwards;--l:460"/>
<line x1="120" y1="140" x2="580" y2="140" stroke="rgba(255,248,230,0.06)" stroke-width="0.6"
  stroke-dasharray="460" stroke-dashoffset="460"
  style="animation:draw 0.5s ease 1.2s forwards;--l:460"/>

<!-- threshold line (danger zone) -->
<line x1="120" y1="200" x2="580" y2="200"
  stroke="rgba(220,60,40,0.45)" stroke-width="1" stroke-dasharray="6 4"
  stroke-dashoffset="460" style="animation:draw 0.8s ease 1.5s forwards;--l:460"/>
<text x="588" y="204" font-family="Georgia,serif" font-size="9" fill="rgba(220,60,40,0.7)"
  font-style="italic" opacity="0"
  style="animation:fadeUp 0.3s ease 2s forwards">risk threshold</text>

<!-- BAR CHART — SKUs, some flagged red -->
<!-- safe bars (low return) -->
<rect x="138" y="320" width="22" height="60" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 1.8s both;--bh:60;--ty:320;--by:380"/>
<rect x="176" y="310" width="22" height="70" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 1.9s both;--bh:70;--ty:310;--by:380"/>
<rect x="214" y="330" width="22" height="50" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 2s both;--bh:50;--ty:330;--by:380"/>
<rect x="252" y="305" width="22" height="75" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 2.1s both;--bh:75;--ty:305;--by:380"/>

<!-- FLAGGED bars (high return — cross threshold) -->
<rect x="290" y="155" width="22" height="225" fill="rgba(220,60,40,0.55)" rx="2"
  style="animation:barRise 0.5s ease 2.2s both;--bh:225;--ty:155;--by:380"/>
<rect x="328" y="320" width="22" height="60" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 2.3s both;--bh:60;--ty:320;--by:380"/>
<rect x="366" y="170" width="22" height="210" fill="rgba(220,60,40,0.5)" rx="2"
  style="animation:barRise 0.5s ease 2.4s both;--bh:210;--ty:170;--by:380"/>
<rect x="404" y="340" width="22" height="40" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 2.5s both;--bh:40;--ty:340;--by:380"/>
<rect x="442" y="300" width="22" height="80" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 2.6s both;--bh:80;--ty:300;--by:380"/>
<rect x="480" y="130" width="22" height="250" fill="rgba(220,60,40,0.6)" rx="2"
  style="animation:barRise 0.5s ease 2.7s both;--bh:250;--ty:130;--by:380"/>
<rect x="518" y="325" width="22" height="55" fill="rgba(255,248,230,0.15)" rx="2"
  style="animation:barRise 0.5s ease 2.8s both;--bh:55;--ty:325;--by:380"/>

<!-- FLAG icons on risky bars -->
<g opacity="0" style="animation:fadeUp 0.4s ease 3s forwards">
  <line x1="301" y1="148" x2="301" y2="126" stroke="rgba(220,60,40,0.9)" stroke-width="1.2"/>
  <polygon points="301,126 315,132 301,138" fill="rgba(220,60,40,0.9)"/>
  <line x1="377" y1="163" x2="377" y2="141" stroke="rgba(220,60,40,0.9)" stroke-width="1.2"/>
  <polygon points="377,141 391,147 377,153" fill="rgba(220,60,40,0.9)"/>
  <line x1="491" y1="123" x2="491" y2="101" stroke="rgba(220,60,40,0.9)" stroke-width="1.2"/>
  <polygon points="491,101 505,107 491,113" fill="rgba(220,60,40,0.9)"/>
</g>

<!-- SCAN LINE sweeping down (AI scanning effect) -->
<g clip-path="url(#chartClip)" opacity="0" style="animation:fadeUp 0.1s ease 3.4s forwards">
  <rect x="120" y="0" width="460" height="2" fill="rgba(255,200,100,0.25)"
    style="animation:scanH 2s ease 3.5s forwards"/>
</g>

<!-- ── CALLOUTS ── -->

<!-- Callout: flagged SKU -->
<circle cx="491" cy="128" r="0" fill="rgba(220,60,40,0.9)"
  style="animation:pop 0.3s ease 3.8s forwards"/>
<line x1="495" y1="126" x2="640" y2="100"
  stroke="rgba(255,248,230,0.4)" stroke-width="0.8" stroke-dasharray="4 3"
  stroke-dashoffset="160" style="animation:draw 0.4s ease 3.9s forwards;--l:160"/>
<text x="650" y="93" font-family="Georgia,serif" font-size="13" font-weight="700"
  letter-spacing="1.5" fill="rgba(255,248,230,0.95)" opacity="0"
  style="animation:fadeUp 0.4s ease 4.1s forwards">RETURN RISK</text>
<text x="650" y="111" font-family="Georgia,serif" font-size="11" font-style="italic"
  fill="rgba(255,248,230,0.5)" opacity="0"
  style="animation:fadeUp 0.4s ease 4.2s forwards">3 SKUs flagged before dispatch</text>

<!-- Callout: factors -->
<circle cx="301" cy="155" r="0" fill="rgba(220,60,40,0.8)"
  style="animation:pop 0.3s ease 4.3s forwards"/>
<line x1="297" y1="154" x2="68" y2="168"
  stroke="rgba(255,248,230,0.4)" stroke-width="0.8" stroke-dasharray="4 3"
  stroke-dashoffset="240" style="animation:draw 0.4s ease 4.4s forwards;--l:240"/>
<text x="24" y="158" font-family="Georgia,serif" font-size="12" font-weight="700"
  letter-spacing="1.5" fill="rgba(255,248,230,0.95)" opacity="0"
  style="animation:fadeUp 0.4s ease 4.6s forwards">SIZE CURVE</text>
<text x="24" y="173" font-family="Georgia,serif" font-size="11" font-style="italic"
  fill="rgba(255,248,230,0.45)" opacity="0"
  style="animation:fadeUp 0.4s ease 4.7s forwards">Fabric type · Listing quality</text>

<!-- Callout: threshold -->
<circle cx="120" cy="200" r="0" fill="rgba(220,60,40,0.7)"
  style="animation:pop 0.3s ease 4.8s forwards"/>
<line x1="116" y1="200" x2="60" y2="240"
  stroke="rgba(255,248,230,0.4)" stroke-width="0.8" stroke-dasharray="4 3"
  stroke-dashoffset="80" style="animation:draw 0.3s ease 4.9s forwards;--l:80"/>
<text x="24" y="234" font-family="Georgia,serif" font-size="12" font-weight="700"
  letter-spacing="1.5" fill="rgba(255,248,230,0.95)" opacity="0"
  style="animation:fadeUp 0.4s ease 5.1s forwards">HISTORICAL</text>
<text x="24" y="250" font-family="Georgia,serif" font-size="11" font-style="italic"
  fill="rgba(255,248,230,0.45)" opacity="0"
  style="animation:fadeUp 0.4s ease 5.2s forwards">Return behaviour signal</text>

<!-- ── LEGEND / TAG ── -->
<text x="650" y="340" font-family="Georgia,serif" font-size="9.5" letter-spacing="2"
  fill="rgba(220,60,40,0.7)" opacity="0"
  style="animation:fadeUp 0.4s ease 5.4s forwards">PREDICTIVE · PRE-DISPATCH</text>

<!-- bottom rule -->
<line x1="24" y1="510" x2="876" y2="510"
  stroke="rgba(255,248,230,0.1)" stroke-width="0.8"
  stroke-dasharray="852" stroke-dashoffset="852"
  style="animation:draw 1s ease 5.6s forwards;--l:852"/>
<text x="24" y="528" font-family="Georgia,serif" font-size="9.5" letter-spacing="2"
  fill="rgba(255,248,230,0.25)" opacity="0"
  style="animation:fadeUp 0.5s ease 5.8s forwards">RETURN RISK, BEFORE IT HITS — GRADA</text>
<text x="876" y="528" font-family="Georgia,serif" font-size="9.5" letter-spacing="1.5"
  fill="rgba(255,248,230,0.25)" text-anchor="end" opacity="0"
  style="animation:fadeUp 0.5s ease 5.9s forwards">INTELLIGENCE LAYER</text>

</svg>
