<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Grada — Marketplace Exports</title>
<style>
  :root {
    --grada-accent: #A06F42;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; }
  body { background: var(--grada-accent); display: flex; justify-content: center; align-items: center; min-height: 100%; }
  svg { display: block; width: 100%; max-width: 800px; max-height: 100%; margin: 0 auto; }

  @keyframes drawPath {
    from {
      stroke-dashoffset: var(--len, 800)
    }

    to {
      stroke-dashoffset: 0
    }
  }

  @keyframes dotPop {
    from {
      opacity: 0;
      transform: scale(0)
    }

    to {
      opacity: 1;
      transform: scale(1)
    }
  }

  @keyframes lineGrow {
    from {
      stroke-dashoffset: var(--ll, 60)
    }

    to {
      stroke-dashoffset: 0
    }
  }

  @keyframes labelIn {
    from {
      opacity: 0;
      transform: translateY(5px)
    }

    to {
      opacity: 1;
      transform: translateY(0)
    }
  }

  @keyframes cardIn {
    from {
      opacity: 0;
      transform: scale(0.88)
    }

    to {
      opacity: 1;
      transform: scale(1)
    }
  }

  @keyframes arrowSlide {
    from {
      stroke-dashoffset: var(--ll, 80)
    }

    to {
      stroke-dashoffset: 0
    }
  }
</style>
</head>
<body>
<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="500" fill="var(--grada-accent)" />

  <!-- central catalog node -->
  <rect x="320" y="208" width="160" height="60" rx="5" fill="rgba(167,139,250,0.08)" stroke="rgba(255,255,255,0.65)"
    stroke-width="1.4" stroke-dasharray="440" stroke-dashoffset="440"
    style="animation:drawPath 1.2s ease 0.3s forwards;--len:440" />
  <text x="400" y="233" font-family="Georgia,serif" font-size="10" letter-spacing="2" fill="rgba(255,255,255,0.94)"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.4s ease 1.5s forwards">CATALOG</text>
  <text x="400" y="250" font-family="Georgia,serif" font-size="10" font-style="italic" fill="rgba(232,228,220,0.4)"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.4s ease 1.7s forwards">142 products</text>

  <!-- ── spokes + channel boxes ── -->

  <!-- Myntra top-left -->
  <line x1="330" y1="212" x2="176" y2="126" stroke="rgba(245,78,78,0.4)" stroke-width="0.9" stroke-dasharray="4 3"
    stroke-dashoffset="200" style="animation:lineGrow 0.5s ease 2s forwards;--ll:200" />
  <rect x="80" y="80" width="120" height="46" rx="4" fill="rgba(245,78,78,0.07)" stroke="rgba(255,255,255,0.5)"
    stroke-width="1" stroke-dasharray="332" stroke-dashoffset="332"
    style="animation:drawPath 0.5s ease 2.4s forwards;--len:332" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/b/bc/Myntra_Logo.png" x="95" y="88" width="90" height="28"
    opacity="0" style="animation:labelIn 0.3s ease 2.8s forwards" />

  <!-- Ajio left -->
  <line x1="320" y1="238" x2="196" y2="238" stroke="rgba(251,146,60,0.4)" stroke-width="0.9" stroke-dasharray="4 3"
    stroke-dashoffset="130" style="animation:lineGrow 0.5s ease 2.2s forwards;--ll:130" />
  <rect x="80" y="210" width="120" height="46" rx="4" fill="rgba(251,146,60,0.07)" stroke="rgba(255,255,255,0.5)"
    stroke-width="1" stroke-dasharray="332" stroke-dashoffset="332"
    style="animation:drawPath 0.5s ease 2.6s forwards;--len:332" />
  <image href="https://images.seeklogo.com/logo-png/34/1/ajio-logo-png_seeklogo-348946.png" x="90" y="220" width="100"
    height="26" opacity="0" style="animation:labelIn 0.3s ease 3s forwards" />

  <!-- Flipkart bottom-left -->
  <line x1="330" y1="264" x2="176" y2="350" stroke="rgba(52,211,153,0.4)" stroke-width="0.9" stroke-dasharray="4 3"
    stroke-dashoffset="200" style="animation:lineGrow 0.5s ease 2.4s forwards;--ll:200" />
  <rect x="80" y="326" width="120" height="46" rx="4" fill="rgba(52,211,153,0.07)" stroke="rgba(255,255,255,0.5)"
    stroke-width="1" stroke-dasharray="332" stroke-dashoffset="332"
    style="animation:drawPath 0.5s ease 2.8s forwards;--len:332" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/e/e5/Flipkart_logo_%282026%29.svg" x="95" y="335"
    width="90" height="26" opacity="0" style="animation:labelIn 0.3s ease 3.2s forwards" />

  <!-- Amazon top-right -->
  <rect x="600" y="78" width="120" height="52" rx="4" fill="rgba(251,191,36,0.07)" stroke="rgba(255,255,255,0.5)"
    stroke-width="1" stroke-dasharray="344" stroke-dashoffset="344"
    style="animation:drawPath 0.5s ease 3s forwards;--len:344" />
  <g opacity="0" style="animation:labelIn 0.3s ease 3.4s forwards">
    <!-- amazon lowercase wordmark -->
    <text x="614" y="101" font-family="Arial,sans-serif" font-size="14" font-weight="400" letter-spacing="-0.5"
      fill="rgba(232,228,220,0.92)">amazon</text>
    <!-- .in superscript -->
    <text x="689" y="96" font-family="Arial,sans-serif" font-size="9" fill="rgba(251,191,36,0.85)">.in</text>
    <!-- smile arrow: curves from a to n -->
    <path d="M615 107 Q638 117 664 107" fill="none" stroke="rgba(251,191,36,0.9)" stroke-width="2"
      stroke-linecap="round" />
    <!-- arrow tip -->
    <path d="M661 105 L664 107 L660 110" fill="none" stroke="rgba(251,191,36,0.9)" stroke-width="1.5"
      stroke-linecap="round" stroke-linejoin="round" />
    <text x="660" y="122" font-family="Georgia,serif" font-size="8" font-style="italic" fill="rgba(232,228,220,0.3)"
      text-anchor="middle">ASIN-ready fields</text>
  </g>
  <!-- Nykaa right -->
  <line x1="480" y1="238" x2="604" y2="238" stroke="rgba(167,139,250,0.4)" stroke-width="0.9" stroke-dasharray="4 3"
    stroke-dashoffset="130" style="animation:lineGrow 0.5s ease 2.8s forwards;--ll:130" />
  <rect x="600" y="210" width="120" height="46" rx="4" fill="rgba(167,139,250,0.07)" stroke="rgba(255,255,255,0.5)"
    stroke-width="1" stroke-dasharray="332" stroke-dashoffset="332"
    style="animation:drawPath 0.5s ease 3.2s forwards;--len:332" />
  <image href="https://upload.wikimedia.org/wikipedia/commons/0/00/Nykaa_New_Logo.svg" x="612" y="220" width="85"
    height="26" opacity="0" style="animation:labelIn 0.3s ease 3.6s forwards" />

  <!-- Generic bottom-right -->
  <line x1="470" y1="264" x2="624" y2="350" stroke="rgba(232,228,220,0.2)" stroke-width="0.9" stroke-dasharray="4 3"
    stroke-dashoffset="200" style="animation:lineGrow 0.5s ease 3s forwards;--ll:200" />
  <rect x="600" y="326" width="120" height="46" rx="4" fill="rgba(232,228,220,0.03)" stroke="rgba(255,255,255,0.4)"
    stroke-width="1" stroke-dasharray="332" stroke-dashoffset="332"
    style="animation:drawPath 0.5s ease 3.4s forwards;--len:332" />
  <text x="660" y="345" font-family="Georgia,serif" font-size="11" font-weight="700" fill="rgba(232,228,220,0.5)"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.3s ease 3.8s forwards">Generic</text>
  <text x="660" y="361" font-family="Georgia,serif" font-size="9" font-style="italic" fill="rgba(232,228,220,0.25)"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.3s ease 3.9s forwards">custom channels</text>

  <!-- ── callout: build once ── -->
  <circle cx="400" cy="208" r="3" fill="rgba(167,139,250,0.9)" opacity="0"
    style="animation:dotPop 0.3s ease 4.2s forwards" />
  <line x1="400" y1="205" x2="400" y2="148" stroke="rgba(167,139,250,0.5)" stroke-width="0.8" stroke-dasharray="4 3"
    stroke-dashoffset="60" style="animation:lineGrow 0.4s ease 4.3s forwards;--ll:60" />
  <text x="400" y="138" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="2"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.4s ease 4.5s forwards">BUILD ONCE</text>
  <text x="400" y="154" font-family="Georgia,serif" font-size="11" font-style="italic" fill="rgba(232,228,220,0.45)"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.4s ease 4.6s forwards">export to every channel</text>

  <!-- ── callout: validated ── -->
  <circle cx="400" cy="268" r="3" fill="rgba(167,139,250,0.9)" opacity="0"
    style="animation:dotPop 0.3s ease 4.7s forwards" />
  <line x1="400" y1="271" x2="400" y2="330" stroke="rgba(167,139,250,0.5)" stroke-width="0.8" stroke-dasharray="4 3"
    stroke-dashoffset="60" style="animation:lineGrow 0.4s ease 4.8s forwards;--ll:60" />
  <text x="400" y="350" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="2"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.4s ease 5s forwards">VALIDATED</text>
  <text x="400" y="366" font-family="Georgia,serif" font-size="11" font-style="italic" fill="rgba(232,228,220,0.45)"
    text-anchor="middle" opacity="0" style="animation:labelIn 0.4s ease 5.1s forwards">before every export</text>

  <!-- bottom rule -->
  <line x1="40" y1="430" x2="760" y2="430" stroke="rgba(232,228,220,0.08)" stroke-width="0.8" stroke-dasharray="720"
    stroke-dashoffset="720" style="animation:lineGrow 1s ease 5.4s forwards;--ll:720" />
  <text x="40" y="450" font-family="Georgia,serif" font-size="10" fill="rgba(232,228,220,0.2)" letter-spacing="2"
    opacity="0" style="animation:labelIn 0.5s ease 5.6s forwards">MARKETPLACE EXPORTS — GRADA</text>
  <text x="760" y="450" font-family="Georgia,serif" font-size="10" fill="rgba(232,228,220,0.2)" letter-spacing="1"
    text-anchor="end" opacity="0" style="animation:labelIn 0.5s ease 5.7s forwards">6 CHANNELS · EXACT FORMAT</text>
</svg>
</body>
</html>
